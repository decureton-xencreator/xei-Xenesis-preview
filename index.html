(48px,15vw,82px)}}@media(max-width:520px){.scene{padding-left:18px;padding-right:18px}.editorHead{align-items:flex-start;flex-direction:column}.progress{width:30vw}.quote{font-size:clamp(26px,8vw,44px)}}@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}</style></head><body><div class="app"><div id="entry" class="entry"><div class="center"><div class="entrymark"></div><div class="eyebrow">XEI · Xenesis Executive Premiere</div><div class="display medium" style="margin-top:20px">Living Companies</div><p class="lead" style="margin:22px auto 0">A guided executive experience for Checkmate Holding Group.</p><div class="actions"><button class="btn primary" data-enter="guided">Begin Premiere</button><button class="btn" data-enter="silent">Begin Silently</button></div></div></div><header id="topbar" class="topbar"><div class="brand"><div class="brandmark"></div><div class="brandtext">Xen · Designing Living Companies</div></div><div class="progress"><i id="progress"></i></div></header><div id="stage"></div><div id="sceneNo" class="sceneNo"></div><nav id="controls" class="controls"><button id="sound" class="ctrl">Voice: On</button><button id="prev" class="ctrl">←</button><button id="next" class="ctrl">→</button></nav><div id="toast" class="toast"></div></div><script>const S=[['The Question',`<div class="inner center"><div class="eyebrow">Before we begin</div><div class="display" style="margin-top:20px">Should a company remember?</div><p class="lead" style="margin:30px auto 0">Not files. Not data. What its people learn, what its leaders decide, and what makes it successful.</p><div class="actions"><button class="btn primary jump">Yes. It should.</button></div></div>`,'Ed, before I show you anything, I want to ask one question. Should a company remember?'],['Assessment 01',`<div class="inner"><div class="eyebrow">Living Company Assessment · 01</div><h2 style="margin-top:15px">When one of your best employees leaves, what does the company lose?</h2><div class="answers"><button class="answer"><b>Very little</b><small>Knowledge is captured and inherited.</small></button><button class="answer"><b>Some knowledge</b><small>The essentials remain, but experience walks out.</small></button><button class="answer"><b>Too much</b><small>Critical knowledge still lives inside people.</small></button></div></div>`,'When one of your best employees leaves, what does the company lose?'],['Assessment 02',`<div class="inner"><div class="eyebrow">Living Company Assessment · 02</div><h2 style="margin-top:15px">If five key managers disappeared tomorrow, would the companies still make the same decisions?</h2><div class="answers"><button class="answer"><b>Consistently</b><small>Reasoning is embedded in infrastructure.</small></button><button class="answer"><b>Mostly</b><small>Execution continues, but quality may vary.</small></button><button class="answer"><b>Unlikely</b><small>Leadership judgment is concentrated.</small></button></div></div>`,'If five key managers disappeared tomorrow, would the companies still make the same decisions?'],['Assessment 03',`<div class="inner"><div class="eyebrow">Living Company Assessment · 03</div><h2 style="margin-top:15px">What should every company you own remember about the way you want it built?</h2><div class="answers"><button class="answer"><b>How we treat people</b><small>Culture, service, trust and accountability.</small></button><button class="answer"><b>How we execute</b><small>Standards, decisions, systems and quality.</small></button><button class="answer"><b>Everything that works</b><small>Leadership lessons compound across the enterprise.</small></button></div></div>`,'What should every company you own remember about the way you want it built?'],['The Origin',`<div class="inner"><div class="eyebrow">This began with one ordinary problem</div><h2 style="margin-top:15px">We did not have a BDC department.</h2><div class="timeline"><div class="event"><div class="num">01</div><div><h3>Marisol was a virtual assistant.</h3><p>As demand grew, we used her as the BDC because someone had to carry the work.</p></div></div><div class="event"><div class="num">02</div><div><h3>She learned by doing.</h3><p>Leads, follow-up, appointments, CRM behavior, cabinet questions and countertop conversations accumulated through experience.</p></div></div><div class="event"><div class="num">03</div><div><h3>The company was learning.</h3><p>But only one person was learning.</p></div></div></div></div>`,'We did not have a BDC department. Marisol was a virtual assistant. We used her as the BDC, and she learned by doing. The company was learning, but only one person was learning.'],['The Scaling Problem',`<div class="inner center"><div class="eyebrow">The problem becomes visible</div><div class="display medium" style="margin-top:20px">Vianka + five new agents</div><p class="lead" style="margin:26px auto 0">Panamanian. No kitchen cabinet experience. No countertop sales experience. The knowledge had to become infrastructure.</p></div>`,'Then Vianka Gomez became BDC Manager with five Panamanian agents who had no cabinet or countertop sales experience.'],['The Decision',`<div class="inner center"><div class="eyebrow">The strategic decision</div><div class="quote" style="margin-top:24px">We could keep teaching every new person from the beginning.<br><br><span class="dim">Or we could teach the company.</span></div><div class="actions"><button class="btn green jump">We chose infrastructure</button></div></div>`,'We could keep teaching every new person from the beginning, or teach the company. We chose infrastructure.'],['Living Infrastructure',`<div class="inner"><div class="eyebrow">The BDC Operating System</div><h2 style="margin-top:15px">The manuals were never just books.</h2><p class="lead">Every manual inside Xen is a Living Document.</p><div class="manuals">${['BDC Foundations','Cabinet Intelligence','Countertop Intelligence','Sales Psychology','CRM & Follow-Up','Appointment Standards','Agent Coaching','Manager OS'].map(x=>`<div class="manual"><span>Living Document</span><b>${x}</b></div>`).join('')}</div></div>`,'The manuals became living infrastructure: a company that could remember, train, align and improve.'],['The Proof',`<div class="inner center"><div class="eyebrow">The proof</div><div class="display medium" style="margin-top:22px">For the first time,<br><span class="accent">the company remembered.</span></div><p class="lead" style="margin:30px auto 0">Vianka does not inherit Marisol. She inherits infrastructure.</p></div>`,'For the first time, the company remembered. Vianka does not inherit Marisol. She inherits infrastructure.'],['Live Executive Build',`<div class="inner"><div class="eyebrow">Live Executive Build</div><h2 style="margin-top:14px">Ed teaches the company.</h2><div class="liveWrap" style="margin-top:28px"><div class="voicebox center"><div class="orb"></div><div id="transcript" class="transcript">“Tell Xen one principle you want every BDC agent to follow.”</div><div class="actions"><button id="listen" class="btn green">Start Voice Capture</button><button id="sample" class="btn">Use Premiere Response</button></div></div><div class="manualEditor"><div class="editorHead"><div><div class="eyebrow">XBM-104 · BDC Agent Standard</div><h3 style="margin-top:7px">Consultative Customer Guidance</h3></div><span class="tag">Living Document</span></div><div class="editorBody"><div class="change"><del>Move qualified prospects quickly toward an appointment.</del><ins id="newText">Awaiting executive intent...</ins></div><div id="approveWrap" class="actions" style="justify-content:flex-start;display:none"><button id="approve" class="btn green">Institutionalize Decision</button></div><div id="syncList" class="syncList" style="display:none"><div class="sync"><span>BDC Agent Manual</span><em>Updated</em></div><div class="sync"><span>Manager Manual</span><em>Inherited</em></div><div class="sync"><span>Coaching Guide</span><em>Inherited</em></div><div class="sync"><span>Future New-Hire Training</span><em>Inherited</em></div></div></div></div></div></div>`,'Ed, tell Xen one principle you want every BDC agent to follow. Your words will become organizational knowledge.'],['Organizational Learning',`<div class="inner center"><div class="eyebrow">Living Infrastructure Synchronized</div><div class="display medium" style="margin-top:22px">Your company has learned something new.</div><p class="lead" style="margin:30px auto 0">One executive decision now improves every future manager, agent, coach and training experience.</p></div>`,'Your company has learned something new.'],['Living Company',`<div class="inner center"><div class="eyebrow">The discovery</div><h2 style="margin-top:14px">Is the BDC the only place where this happens?</h2><p class="lead" style="margin:28px auto 0">Sales. Operations. HR. Finance. Leadership. Acquisitions. Every department contains knowledge. Very few companies protect it.</p><div class="display medium" style="margin-top:38px"><span class="accent">Living Company</span></div></div>`,'Every department contains knowledge. Very few companies protect it. This is the beginning of a Living Company.'],['XenOS Reveal',`<div class="inner center"><div class="eyebrow">The operating system for designing Living Companies</div><div class="display" style="margin-top:18px">Xen<span class="accent">OS</span></div><p class="lead" style="margin:28px auto 0">The manuals were the first proof. Enterprise memory is the foundation. A Living Company is the outcome.</p></div>`,'Xen is the operating system for designing Living Companies.'],['Executive Summary',`<div class="inner"><div class="eyebrow">Prepared for Ed · Generated from today’s conversation</div><h2 style="margin-top:14px">Executive Summary</h2><div class="brief"><div class="panel"><span class="tag">Executive Observation</span><h3 style="margin-top:12px">Checkmate’s opportunity is not merely to document what its companies know.</h3><p>It is to convert leadership knowledge, operating lessons and proven decisions into living infrastructure that every company can inherit and continuously improve.</p></div><div class="panel"><span class="tag">Living Company Readiness</span><div class="score">41<small style="font-size:.28em;color:var(--soft)">/100</small></div><p>High entrepreneurial intelligence. Significant enterprise-memory opportunity.</p></div></div><div class="gps"><div class="panel"><span class="tag">Executive GPS · 01</span><div><h3>Map enterprise memory</h3><p>Identify where critical knowledge currently lives.</p></div></div><div class="panel"><span class="tag">Executive GPS · 02</span><div><h3>Select one department</h3><p>Build the first Checkmate Living Department.</p></div></div><div class="panel"><span class="tag">Executive GPS · 03</span><div><h3>Build inheritance</h3><p>Create a model future companies can receive.</p></div></div></div></div>`,'Here is the executive summary generated from today’s conversation. Checkmate’s opportunity is to convert leadership into living infrastructure.'],['Second Meeting Hook',`<div class="inner center"><div class="eyebrow">Phase II · Memory Mapping Session</div><div class="display medium" style="margin-top:20px">Would you like to see what your entire company remembers today?</div><div class="memoryCTA"><h3>Design the first Living Department inside Checkmate.</h3><p class="lead" style="font-size:18px;margin:14px auto 0">Map where knowledge lives, expose continuity risk and produce the first enterprise memory blueprint.</p><div class="actions"><button id="discovery" class="btn green">Begin Enterprise Discovery</button><button class="btn">Not Yet</button></div></div></div>`,'The next session is not another demo. It is a Memory Mapping Session to design the first Living Department inside Checkmate.'],['Close',`<div class="inner center"><div class="quote">Will your company know more five years from now...<br><span class="dim">or will it simply have different employees?</span></div><div style="margin-top:54px"><div class="display medium">Xen</div><div class="eyebrow" style="margin-top:14px;color:var(--green)">Designing Living Companies</div></div></div>`,'Living Companies remember. They learn. They evolve. Xen. Designing Living Companies.']];const stage=document.getElementById('stage');S.forEach((s,i)=>{let e=document.createElement('section');e.className='scene';e.innerHTML=s[1];stage.appendChild(e)});const E=[...document.querySelectorAll('.scene')],entry=document.getElementById('entry'),controls=document.getElementById('controls'),topbar=document.getElementById('topbar'),progress=document.getElementById('progress'),sceneNo=document.getElementById('sceneNo'),toast=document.getElementById('toast');let idx=0,voice=true,touchX=0,intent='Every BDC representative should educate the customer before attempting to close the sale.';function speak(t){if(!voice||!speechSynthesis)return;speechSynthesis.cancel();let u=new SpeechSynthesisUtterance(t);u.rate=.92;u.pitch=.94;let v=speechSynthesis.getVoices();u.voice=v.find(x=>/en-US|en-GB/.test(x.lang)&&/natural|samantha|daniel|ava|serena|google/i.test(x.name))||v.find(x=>/en-US|en-GB/.test(x.lang))||null;speechSynthesis.speak(u)}function toastMsg(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1500)}function show(n){if(n<0||n>=E.length)return;E[idx].classList.remove('active');idx=n;E[idx].classList.add('active');progress.style.width=(idx+1)/E.length*100+'%';sceneNo.textContent=String(idx+1).padStart(2,'0')+' / '+E.length+' · '+S[idx][0];bind();setTimeout(()=>speak(S[idx][2]),350)}function setIntent(t){intent=t||intent;document.getElementById('transcript').textContent='“'+intent+'”';document.getElementById('newText').textContent='Every BDC representative must first educate the customer, clarify the customer’s needs, and build trust before attempting to advance or close the sale.';document.getElementById('approveWrap').style.display='flex';speak('I found the living standards that should inherit that principle.')}function listen(){let R=window.SpeechRecognition||window.webkitSpeechRecognition;if(!R){toastMsg('Using reliable premiere response');return setIntent(intent)}let r=new R();r.lang='en-US';r.interimResults=true;r.onresult=e=>{let t='';for(let i=e.resultIndex;i<e.results.length;i++)t+=e.results[i][0].transcript;document.getElementById('transcript').textContent='“'+t+'”';if(e.results[e.results.length-1].isFinal)setIntent(t)};r.onerror=()=>setIntent(intent);r.start()}function bind(){document.querySelectorAll('.jump').forEach(b=>b.onclick=()=>show(idx+1));document.querySelectorAll('.answers').forEach(g=>g.querySelectorAll('.answer').forEach(b=>b.onclick=()=>{g.querySelectorAll('.answer').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');toastMsg('Answer remembered');setTimeout(()=>show(idx+1),500)}));let a=document.getElementById('sample'),l=document.getElementById('listen'),p=document.getElementById('approve'),d=document.getElementById('discovery');if(a)a.onclick=()=>setIntent(intent);if(l)l.onclick=listen;if(p)p.onclick=()=>{document.getElementById('syncList').style.display='grid';document.getElementById('approveWrap').style.display='none';toastMsg('Executive intent institutionalized');speak('Today’s leadership has become tomorrow’s operating standard.');setTimeout(()=>show(idx+1),3000)};if(d)d.onclick=()=>{toastMsg('Memory Mapping Session activated');setTimeout(()=>show(idx+1),800)}}function enter(m){voice=m==='guided';entry.classList.add('hide');controls.classList.add('show');topbar.classList.add('show');sceneNo.classList.add('show');document.getElementById('sound').textContent=voice?'Voice: On':'Voice: Off';E[0].classList.add('active');show(0)}document.querySelectorAll('[data-enter]').forEach(b=>b.onclick=()=>enter(b.dataset.enter));document.getElementById('next').onclick=()=>show(idx+1);document.getElementById('prev').onclick=()=>show(idx-1);document.getElementById('sound').onclick=()=>{voice=!voice;speechSynthesis.cancel();document.getElementById('sound').textContent=voice?'Voice: On':'Voice: Off'};document.addEventListener('keydown',e=>{if(['ArrowRight','PageDown'].includes(e.key))show(idx+1);if(['ArrowLeft','PageUp'].includes(e.key))show(idx-1)});document.addEventListener('touchstart',e=>touchX=e.changedTouches[0].clientX,{passive:true});document.addEventListener('touchend',e=>{let d=e.changedTouches[0].clientX-touchX;if(Math.abs(d)>65)show(idx+(d<0?1:-1))},{passive:true});</script></body></html>
