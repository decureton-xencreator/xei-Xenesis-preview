<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#050607"><meta name="description" content="XEI Xenesis Executive Experience"><title>XEI Xenesis</title><style>:root{--bg:#050607;--ink:#f4f2ec;--muted:rgba(244,242,236,.58);--line:rgba(255,255,255,.14)}*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{display:grid;place-items:center;overflow:hidden;background:radial-gradient(900px 650px at 80% 5%,rgba(48,67,80,.22),transparent 62%),radial-gradient(800px 620px at 8% 100%,rgba(30,67,47,.17),transparent 65%),#050607}.shell{width:min(1200px,100%);min-height:100dvh;padding:max(32px,env(safe-area-inset-top)) clamp(24px,7vw,110px) max(32px,env(safe-area-inset-bottom));display:grid;align-content:center;gap:28px}.mark{width:78px;height:78px;border:1px solid var(--line);border-radius:50%;position:relative}.mark:before,.mark:after{content:"";position:absolute;left:50%;top:50%;background:rgba(255,255,255,.72);transform:translate(-50%,-50%)}.mark:before{width:1px;height:44px}.mark:after{height:1px;width:44px}.eyebrow{font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.45)}h1{font:400 clamp(4rem,9vw,10rem)/.9 Georgia,"Times New Roman",serif;letter-spacing:-.055em;margin:0;max-width:1100px}.lead{font-size:clamp(1.15rem,2vw,1.9rem);line-height:1.5;color:var(--muted);max-width:760px}.cursor{display:inline-block;width:.075em;height:.82em;background:currentColor;margin-left:.06em;vertical-align:-.04em;animation:breathe 2s ease-in-out infinite}@keyframes breathe{0%,100%{opacity:.14}50%{opacity:1}}.route{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.route span{border:1px solid var(--line);border-radius:999px;padding:11px 16px;color:rgba(255,255,255,.68);font-size:.82rem}.route span:last-child{background:var(--ink);color:var(--bg);border-color:transparent}@media(max-width:720px){body{overflow:auto}.shell{align-content:end;padding-bottom:max(48px,calc(env(safe-area-inset-bottom) + 28px))}h1{font-size:clamp(3.7rem,17vw,6rem)}.route{display:grid;grid-template-columns:1fr 1fr}.route span{text-align:center}}@media(prefers-reduced-motion:reduce){*{animation:none!important}}</style></head><body><main class="shell"><div class="mark" aria-hidden="true"></div><div class="eyebrow">XEI · Xenesis Executive Experience</div><h1>Every company has a destination.<span class="cursor" aria-hidden="true"></span></h1><p class="lead">Xenesis helps leaders understand the enterprise they have, design the enterprise they intend to build, and navigate the responsible route between them.</p><div class="route" aria-label="Executive navigation sequence"><span>Current Position</span><span>Destination</span><span>Dependencies</span><span>Route</span><span>Next Decision</span></div></main></body></html>
