<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#050607"><title>XEI Genesis</title><style>:root{--bg:#050607;--ink:#f4f2ec;--line:rgba(255,255,255,.14);--ease:cubic-bezier(.22,.8,.2,1)}*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}body{background:radial-gradient(80vw 80vh at 75% 10%,rgba(42,54,63,.2),transparent 62%),radial-gradient(70vw 70vh at 10% 100%,rgba(26,47,39,.18),transparent 66%),#050607}button{font:inherit}.scene{position:absolute;inset:0;padding:max(24px,env(safe-area-inset-top)) clamp(20px,6vw,96px) max(24px,env(safe-area-inset-bottom));display:grid;place-items:center;opacity:0;transform:scale(1.012);pointer-events:none;transition:opacity .7s var(--ease),transform .9s var(--ease)}.scene.active{opacity:1;transform:scale(1);pointer-events:auto}.inner{width:min(1180px,100%);margin:auto}.center{text-align:center}.kicker{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.48)}h1,h2,.hero{font-family:Georgia,"Times New Roman",serif;font-weight:400;letter-spacing:-.045em;line-height:.96;margin:0}.hero{font-size:clamp(48px,7vw,118px)}h2{font-size:clamp(38px,5vw,80px)}.lead{font-size:clamp(17px,1.7vw,28px);line-height:1.5;color:rgba(255,255,255,.66);max-width:760px}.dim{color:rgba(255,255,255,.4)}.cursor{display:inline-block;width:.08em;height:.84em;background:currentColor;margin-left:.06em;vertical-align:-.05em;animation:breathe 2s ease-in-out infinite}@keyframes breathe{0%,100%{opacity:.16}50%{opacity:1}}#entry{position:absolute;inset:0;z-index:20;display:grid;place-items:center;padding:24px;background:#050607;transition:.7s var(--ease)}#entry.hide{opacity:0;visibility:hidden}.entrymark{width:72px;height:72px;border:1px solid var(--line);border-radius:50%;margin:0 auto 28px;position:relative}.entrymark:before,.entrymark:after{content:"";position:absolute;background:rgba(255,255,255,.72)}.entrymark:before{width:1px;height:40px;left:50%;top:15px}.entrymark:after{height:1px;width:40px;left:15px;top:50%}.actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:28px}.pill{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.05);color:var(--ink);padding:14px 20px;border-radius:999px;cursor:pointer}.pill.primary{background:#f4f2ec;color:#050607;border-color:transparent}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-top:42px}.card{min-height:210px;border:1px solid var(--line);border-radius:24px;padding:24px;background:linear-gradient(155deg,rgba(255,255,255,.06),rgba(255,255,255,.015));display:flex;flex-direction:column;justify-content:space-between}.card h3{font:400 26px/1.1 Georgia,serif;margin:0 0 12px}.card p{margin:0;color:rgba(255,255,255,.48);line-height:1.55}.route{display:grid;grid-template-columns:.9fr 1.1fr;gap:56px;align-items:center}.steps{position:relative}.steps:before{content:"";position:absolute;left:17px;top:18px;bottom:18px;width:1px;background:linear-gradient(#24a3ee,rgba(255,255,255,.2),#54d17c)}.step{display:grid;grid-template-columns:36px 1fr;gap:16px;align-items:center;padding:12px 0}.dot{width:9px;height:9px;border-radius:50%;background:white;margin-left:13px;z-index:1;box-shadow:0 0 18px rgba(255,255,255,.3)}.step b{font:400 clamp(18px,1.8vw,28px)/1.1 Georgia,serif}.step small{display:block;color:rgba(255,255,255,.42);margin-top:3px}.stack{max-width:760px;margin:40px auto 0}.stack div{display:flex;justify-content:space-between;gap:20px;align-items:center;border-top:1px solid var(--line);padding:18px 0}.stack b{font:400 clamp(23px,2.8vw,42px)/1 Georgia,serif}.stack span{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.4)}#controls{position:fixed;right:16px;bottom:max(16px,env(safe-area-inset-bottom));z-index:10;display:flex;gap:10px;opacity:0;pointer-events:none}#controls.show{opacity:1;pointer-events:auto}#controls button,#sound{height:46px;min-width:46px;border-radius:999px;border:1px solid var(--line);background:rgba(8,10,12,.76);color:white;padding:0 16px;backdrop-filter:blur(16px)}#sound{position:fixed;left:16px;bottom:max(16px,env(safe-area-inset-bottom));z-index:10;opacity:0;pointer-events:none}#sound.show{opacity:1;pointer-events:auto}@media(max-width:760px){.scene{overflow:auto;align-items:start;padding-top:max(68px,env(safe-area-inset-top))}.inner{min-height:100%;display:flex;flex-direction:column;justify-content:center}.hero{font-size:clamp(44px,13vw,72px)}h2{font-size:clamp(34px,10vw,58px)}.grid{grid-template-columns:1fr;gap:10px;margin-top:28px}.card{min-height:145px}.route{grid-template-columns:1fr;gap:28px}.stack div{align-items:flex-start;flex-direction:column;gap:8px}}@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}</style></head><body><div id="entry"><div class="center"><div class="entrymark"></div><div class="hero" style="font-size:clamp(44px,6vw,78px)">Genesis</div><p class="lead" style="margin:18px auto 0">The first executive experience of XenOS.</p><div class="actions"><button class="pill primary" data-enter="sound">Enter with sound</button><button class="pill" data-enter="silent">Continue silently</button></div></div></div><main id="stage"></main><button id="sound">Sound off</button><nav id="controls"><button id="prev" aria-label="Previous">←</button><button id="next" aria-label="Next">→</button></nav><script>const scenes=[`<div class="inner center"><div id="typed" class="hero"><span class="cursor"></span></div></div>`,`<div class="inner center"><div class="kicker">Checkmate Holding Group</div><div class="hero" style="margin-top:18px">Enterprise Infrastructure Initiative</div><p class="lead" style="margin:26px auto 0">Growth is no longer limited by ambition. It is limited by infrastructure.</p></div>`,`<div class="inner center"><div class="kicker">Enterprise coordinates</div><div class="hero" style="font-size:clamp(100px,20vw,280px);margin-top:16px">31<span style="font-size:.3em;color:rgba(255,255,255,.42)">%</span></div><p class="lead" style="margin:20px auto 0">Current enterprise readiness</p></div>`,`<div class="inner"><div class="kicker">Infrastructure Void Intelligence</div><h2 style="margin-top:12px">The problem is not effort.<br><span class="dim">The infrastructure is incomplete.</span></h2><div class="grid"><div class="card"><div class="kicker">01</div><div><h3>Ownership</h3><p>Critical systems and decisions are concentrated instead of distributed.</p></div></div><div class="card"><div class="kicker">02</div><div><h3>Human Resources</h3><p>Hiring, onboarding and accountability need a governed operating system.</p></div></div><div class="card"><div class="kicker">03</div><div><h3>Project Leadership</h3><p>Transformation requires dedicated sequencing and follow-through.</p></div></div><div class="card"><div class="kicker">04</div><div><h3>Knowledge</h3><p>Institutional intelligence must survive beyond any single person.</p></div></div></div></div>`,`<div class="inner route"><div><div class="kicker">Executive GPS</div><h2 style="margin-top:12px">The destination was never the difficult part.<br><span class="dim">The sequence was.</span></h2></div><div class="steps"><div class="step"><div class="dot"></div><div><b>Executive Governance</b><small>Establish authority and enterprise ownership</small></div></div><div class="step"><div class="dot"></div><div><b>BDC</b><small>Standardize demand conversion</small></div></div><div class="step"><div class="dot"></div><div><b>Sales</b><small>Create repeatable revenue execution</small></div></div><div class="step"><div class="dot"></div><div><b>Human Resources</b><small>Build hiring and accountability</small></div></div><div class="step"><div class="dot"></div><div><b>Knowledge</b><small>Create institutional memory</small></div></div><div class="step"><div class="dot"></div><div><b>Acquisition</b><small>Evaluate and integrate consistently</small></div></div><div class="step"><div class="dot"></div><div><b>Replication</b><small>Onboard each company through inheritance</small></div></div></div></div>`,`<div class="inner center"><div class="kicker">The architecture behind the experience</div><div class="stack"><div><b>Checkmate</b><span>First implementation</span></div><div><b>XEI</b><span>Executive intelligence</span></div><div><b>XEG</b><span>Executive GPS</span></div><div><b>XEN</b><span>Enterprise navigation</span></div><div><b>XenOS</b><span>Purpose operating system</span></div></div></div>`,`<div class="inner center"><div class="hero" style="font-size:clamp(42px,6vw,100px)">Xen exists to reduce the distance between human intention and meaningful achievement.</div></div>`,`<div class="inner center"><div class="hero">Ready to build?<span class="cursor"></span></div><p class="lead" style="margin:26px auto 0">Touch the future.</p></div>`];const stage=document.getElementById('stage');scenes.forEach(h=>{const s=document.createElement('section');s.className='scene';s.innerHTML=h;stage.appendChild(s)});const els=[...document.querySelectorAll('.scene')],entry=document.getElementById('entry'),controls=document.getElementById('controls'),soundBtn=document.getElementById('sound');let idx=0,sound=false,ctx=null,touchX=0,timer=null;function audioStart(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)()}function tone(f=70,d=.6,v=.035){if(!sound||!ctx)return;const o=ctx.createOscillator(),g=ctx.createGain();o.frequency.value=f;g.gain.setValueAtTime(v,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.0001,ctx.currentTime+d);o.connect(g).connect(ctx.destination);o.start();o.stop(ctx.currentTime+d)}function show(n){if(n<0||n>=els.length||n===idx)return;els[idx].classList.remove('active');idx=n;els[idx].classList.add('active');tone(82,.6,.025);if(idx===0)typeIntro()}function typeIntro(){clearTimeout(timer);const t=document.getElementById('typed');if(!t)return;const lines=['Every company has a destination.','Few know the route.','Let’s build yours.'];let li=0,ci=0,del=false;function tick(){const txt=lines[li];if(!del){ci++;t.innerHTML=txt.slice(0,ci)+'<span class="cursor"></span>';if(ci>=txt.length){if(li===2){timer=setTimeout(()=>show(1),2200);return}del=true;timer=setTimeout(tick,1100);return}}else{ci--;t.innerHTML=txt.slice(0,ci)+'<span class="cursor"></span>';if(ci<=0){del=false;li++;timer=setTimeout(tick,320);return}}timer=setTimeout(tick,del?28:58)}tick()}function enter(withSound){sound=withSound;if(sound){audioStart();ctx.resume();tone(45,1,.05)}entry.classList.add('hide');controls.classList.add('show');soundBtn.classList.add('show');soundBtn.textContent=sound?'Sound on':'Sound off';els[0].classList.add('active');typeIntro()}document.querySelectorAll('[data-enter]').forEach(b=>b.onclick=()=>enter(b.dataset.enter==='sound'));document.getElementById('next').onclick=()=>show(idx+1);document.getElementById('prev').onclick=()=>show(idx-1);soundBtn.onclick=()=>{sound=!sound;if(sound){audioStart();ctx.resume();tone(70,.5,.03)}soundBtn.textContent=sound?'Sound on':'Sound off'};document.addEventListener('keydown',e=>{if(['ArrowRight','PageDown',' '].includes(e.key))show(idx+1);if(['ArrowLeft','PageUp'].includes(e.key))show(idx-1)});document.addEventListener('touchstart',e=>touchX=e.changedTouches[0].clientX,{passive:true});document.addEventListener('touchend',e=>{const d=e.changedTouches[0].clientX-touchX;if(Math.abs(d)>50)show(idx+(d<0?1:-1))},{passive:true});</script></body></html>
