name: XEI Gold Master Validation

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Clean Ed Premiere Certification
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Validate clean production runtime
        run: |
          test -f index.html
          test -f src/ed-premiere-clean-v1.css
          test -f src/ed-premiere-clean-v1.js
          test -f tests/ed-premiere-clean-v1.mjs
          node --check src/ed-premiere-clean-v1.js
          node tests/ed-premiere-clean-v1.mjs
