name: XDE Executive Documentary Rollout

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  certify-rollout:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Validate runtime syntax
        run: node --check src/ed-premiere-clean-v1.js
      - name: Certify rollout contract
        run: node tests/xde-rollout-v1.mjs
      - name: Preserve XDE canon
        run: node tests/xde-canon.mjs
      - name: Preserve clean documentary runtime
        run: node tests/ed-premiere-clean-v1.mjs
