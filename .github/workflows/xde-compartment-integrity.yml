name: XDE Compartment Integrity

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  certify-compartments:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Validate protected documentary zones
        run: node tests/xde-compartment-integrity.mjs
      - name: Preserve rollout and XDE contracts
        run: |
          node --check src/ed-premiere-clean-v1.js
          node tests/ed-premiere-clean-v1.mjs
          node tests/xde-canon.mjs