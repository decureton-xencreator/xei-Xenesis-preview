name: Generate Xen executive pitch

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/xen-executive-pitch-copy-v1.mjs'
      - 'scripts/generate-xen-executive-pitch-v1.mjs'
      - 'scripts/verify-xen-executive-pitch-v1.mjs'
      - '.github/workflows/generate-xen-executive-pitch.yml'

permissions:
  contents: write

concurrency:
  group: xen-executive-pitch
  cancel-in-progress: false

jobs:
  pitch:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '24'
      - name: Generate one canonical Marin executive pitch
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/generate-xen-executive-pitch-v1.mjs
      - name: Warden voice and byte verification
        run: node scripts/verify-xen-executive-pitch-v1.mjs
      - name: Commit mastered executive pitch
        run: |
          git config user.name "xen-voice-master"
          git config user.email "actions@users.noreply.github.com"
          git add assets/narration/xcm-v1
          if ! git diff --cached --quiet; then
            git commit -m "Generate canonical Xen executive pitch"
            git push
          fi
